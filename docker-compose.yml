services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Admin CMS (Next.js) ──────────────────────────────────────────────────────
  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
    container_name: portfolio-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_PORT: "5432"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_in_production}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PORTFOLIO_URL: ${PORTFOLIO_URL:-http://localhost:4321}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Portfolio (Astro) ────────────────────────────────────────────────────────
  portfolio:
    build:
      context: ./packages/portfolio
      dockerfile: Dockerfile
      args:        PUBLIC_GA_ID: ${PUBLIC_GA_ID:-}        PUBLIC_GTM_ID: ${PUBLIC_GTM_ID:-}
    container_name: portfolio-site
    restart: unless-stopped
    ports:
      - "${PORTFOLIO_PORT:-4321}:4321"
    environment:
      ADMIN_API_URL: http://admin:3000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}
      HOST: 0.0.0.0
      PORT: 4321
      NODE_ENV: production
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:4321/",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  pgdata:
