name: Deploy to VPS

on:
    push:
        branches: [main]
    workflow_dispatch: # permitir deploy manual desde GitHub

# Cancelar deploys anteriores si hay uno nuevo en cola
concurrency:
    group: deploy-vps
    cancel-in-progress: true

env:
    DEPLOY_PATH: /var/www/CarlosAndresBF_Portfolio

jobs:
    test:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter portfolio run test
            - run: pnpm --filter admin run test

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v4

            # ── Generar .env en el runner a partir de GitHub Secrets ──────────────
            - name: Generate .env from secrets
              run: |
                  cat > .env << 'ENVEOF'
                  # Database
                  POSTGRES_DB=${{ secrets.POSTGRES_DB }}
                  POSTGRES_USER=${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
                  POSTGRES_PORT=5432
                  DB_HOST=postgres

                  # Admin
                  ADMIN_PORT=${{ secrets.ADMIN_PORT }}
                  ADMIN_BASE_URL=${{ secrets.ADMIN_BASE_URL }}
                  NEXTAUTH_URL=${{ secrets.ADMIN_BASE_URL }}
                  NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
                  ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
                  ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}

                  # Portfolio
                  PORTFOLIO_PORT=${{ secrets.PORTFOLIO_PORT }}
                  PORTFOLIO_BASE_URL=${{ secrets.PORTFOLIO_BASE_URL }}
                  PORTFOLIO_URL=${{ secrets.PORTFOLIO_BASE_URL }}
                  PUBLIC_GTM_ID=${{ secrets.PUBLIC_GTM_ID }}

                  # Internal
                  ADMIN_API_URL=http://admin:3000
                  INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}

                  # SMTP
                  SMTP_HOST=${{ secrets.SMTP_HOST }}
                  SMTP_PORT=${{ secrets.SMTP_PORT }}
                  SMTP_SECURE=${{ secrets.SMTP_SECURE }}
                  SMTP_USER=${{ secrets.SMTP_USER }}
                  SMTP_PASS=${{ secrets.SMTP_PASS }}
                  CONTACT_TO_EMAIL=${{ secrets.CONTACT_TO_EMAIL }}
                  ENVEOF
                  # Limpiar espacios en blanco al inicio de cada línea
                  sed -i 's/^          //' .env

            # ── Limpiar código antiguo en el VPS (preservar .env y volúmenes) ──
            - name: Clean old source on VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_SSH_PORT || 22 }}
                  script: |
                      DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
                      if [ -d "$DEPLOY_DIR" ]; then
                          echo "Limpiando código antiguo en $DEPLOY_DIR..."
                          # Preservar .env (tiene secrets de producción) y pgdata (volumen Docker)
                          cd "$DEPLOY_DIR"
                          find . -maxdepth 1 ! -name '.' ! -name '.env' -exec rm -rf {} +
                          echo "✓ Directorio limpio"
                      else
                          echo "Directorio no existe, se creará en el SCP"
                      fi

            # ── Copiar proyecto al VPS ───────────────────────────────────────────
            - name: Copy files to VPS
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_SSH_PORT || 22 }}
                  source: ".,!node_modules,!.git,!packages/*/node_modules,!packages/*/.next,!packages/*/dist"
                  target: ${{ env.DEPLOY_PATH }}
                  overwrite: true

            # ── Build & deploy en el VPS ─────────────────────────────────────────
            - name: Deploy on VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_SSH_PORT || 22 }}
                  command_timeout: 10m
                  script: |
                      set -e
                      cd ${{ env.DEPLOY_PATH }}

                      echo "── Verificando archivos ──"
                      ls -la .env docker-compose.yml

                      echo "── Deteniendo contenedores anteriores ──"
                      docker compose down --remove-orphans || true

                      echo "── Limpiando imágenes antiguas (evitar cache de Dockerfiles obsoletos) ──"
                      docker compose build --no-cache

                      echo "── Levantando contenedores ──"
                      docker compose up -d

                      echo "── Estado inmediato ──"
                      docker compose ps -a

                      echo "── Esperando a PostgreSQL (max 60s) ──"
                      if ! timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} 2>/dev/null; do sleep 3; done'; then
                          echo "❌ PostgreSQL no arrancó"
                          docker compose logs postgres --tail=80
                          docker compose ps -a
                          exit 1
                      fi
                      echo "✓ PostgreSQL listo"

                      echo "── Esperando a Admin (max 120s) ──"
                      if ! timeout 120 bash -c 'until docker compose exec -T admin wget -q --spider http://127.0.0.1:3000/api/health 2>/dev/null; do sleep 5; done'; then
                          echo "❌ Admin no arrancó"
                          docker compose logs admin --tail=80
                          docker compose ps -a
                          exit 1
                      fi
                      echo "✓ Admin listo"

                      echo "── Sincronizando schema de la BD ──"
                      docker compose exec -T admin tsx scripts/sync-schema.ts

                      echo "── Ejecutando seed (idempotente — borra y reinserta) ──"
                      docker compose exec -T postgres psql -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} < docker/postgres/seed.sql

                      echo "── Esperando a Portfolio (max 60s) ──"
                      if ! timeout 60 bash -c 'until docker compose exec -T portfolio wget -q --spider http://127.0.0.1:4321/ 2>/dev/null; do sleep 5; done'; then
                          echo "❌ Portfolio no arrancó"
                          docker compose logs portfolio --tail=80
                          docker compose ps -a
                          exit 1
                      fi
                      echo "✓ Portfolio listo"

                      echo "── Estado final ──"
                      docker compose ps
                      echo "✅ Deploy completado — todos los servicios running"
